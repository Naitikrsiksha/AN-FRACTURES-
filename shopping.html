<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Appointment Booking</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 20px; }
        form { display: flex; flex-direction: column; }
        input { margin: 10px 0; padding: 10px; border: 1px solid #ccc; border-radius: 4px; }
        button { padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:disabled { background-color: #ccc; }
    </style>
    <script>
        let lastSubmission = 0;
        function validateForm(event) {
            event.preventDefault();
            let name = document.getElementById('name').value;
            let phone = document.getElementById('phone').value;
            if (name.length < 3) {
                alert('Name must be at least 3 characters long.');
                return;
            }
            if (!/^[0-9]{10}$/.test(phone)) {
                alert('Phone number must be exactly 10 digits.');
                return;
            }
            let currentTime = Date.now();
            if (currentTime - lastSubmission < 30000) {
                alert('Please wait 30 seconds between submissions.');
                return;
            }
            lastSubmission = currentTime;
            // Simulating form submission process
            document.getElementById('loading').style.display = 'block';
            setTimeout(() => {
                alert('Form submitted successfully!');
                document.getElementById('loading').style.display = 'none';
                document.getElementById('appointment-form').reset();
            }, 2000);
            // Here you would handle integration with Google Sheets and WhatsApp
        }
    </script>
</head>
<body>
    <h1>Book Your Appointment</h1>
    <form id="appointment-form" onsubmit="validateForm(event)">
        <input id="name" type="text" placeholder="Your Name" required />
        <input id="phone" type="text" placeholder="Your Phone Number" required />
        <button type="submit">Submit</button>
        <div id="loading" style="display:none;">Submitting...</div>
    </form>
</body>
</html>
